# Supabase local configuration
project_id = "HMall"

[api]
enabled = true
port = 54330
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54331
major_version = 15

[db.pooler]
enabled = false
port = 54337
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54332

[inbucket]
enabled = true
port = 54334
smtp_port = 54335
pop3_port = 54336

[analytics]
enabled = true
port = 54338

[storage]
enabled = false
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3002"
additional_redirect_urls = ["https://localhost:3002"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true

[edge_runtime]
enabled = false

